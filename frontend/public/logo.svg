<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img" aria-label="Shinso — step-by-step C++ visualizer">
  <title>Shinso</title>
  <rect x="0.5" y="0.5" width="319" height="79" rx="16" fill="#f6f4ef" stroke="#e4dfd4"/>
  <!-- the step mark -->
  <g transform="translate(16 8)">
    <rect x="7" y="38" width="14" height="14" rx="3.5" fill="#0f3d3a"/>
    <rect x="25" y="38" width="14" height="14" rx="3.5" fill="none" stroke="#4b8a6c" stroke-width="3"/>
    <rect x="43" y="38" width="14" height="14" rx="3.5" fill="none" stroke="#4b8a6c" stroke-width="3"/>
    <path d="M 14 38 C 14 9, 50 9, 50 30" fill="none" stroke="#0f3d3a" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 45.5 29.5 L 50 36.5 L 54.5 29.5 Z" fill="#0f3d3a"/>
  </g>
  <!-- wordmark -->
  <text x="92" y="44" font-family="'Source Serif 4', Georgia, 'Times New Roman', serif" font-weight="600" font-style="italic" font-size="32" letter-spacing="-0.4" fill="#292520">Shinso</text>
  <text x="93.5" y="62" font-family="'Source Sans 3', system-ui, sans-serif" font-size="11.5" letter-spacing="0.3" fill="#6f695d">step-by-step C++ visualizer</text>
